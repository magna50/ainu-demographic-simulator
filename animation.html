<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Animated Demographic Simulation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; color: #333; }
        #population-counter { font-size: 2em; margin-bottom: 20px; }
        #chart-container { width: 80%; height: 400px; margin: auto; }
    </style>
</head>
<body>
    <h1>日本の人口動態シミュレーション</h1>
    <div id="population-counter">人口: 0人</div>
    <div id="chart-container">
        <canvas id="population-chart"></canvas>
    </div>
    <button id="start-button">シミュレーション開始</button>

    <script>
        let population = 0;
        const populationCounter = document.getElementById('population-counter');
        const ctx = document.getElementById('population-chart').getContext('2d');

        const data = {
            labels: [],
            datasets: [{
                label: '人口',
                data: [],
                borderColor: 'rgba(75, 192, 192, 1)',
                borderWidth: 2,
                fill: false
            }]
        };

        const config = {
            type: 'line',
            data: data,
            options: {
                scales: {
                    x: { title: { display: true, text: '時間' } },
                    y: { title: { display: true, text: '人口' } }
                }
            }
        };

        const populationChart = new Chart(ctx, config);

        document.getElementById('start-button').addEventListener('click', () => {
            const interval = setInterval(() => {
                population += Math.floor(Math.random() * 100);
                populationCounter.textContent = `人口: ${population}人`;
                const currentTime = new Date().toLocaleTimeString();
                data.labels.push(currentTime);
                data.datasets[0].data.push(population);
                populationChart.update();

                // Storyline / Timeline events
                const events = [
                    { year: 2000, event: '人口のピーク' },
                    { year: 2010, event: '高齢化が進展' },
                    { year: 2020, event: '人口減少開始' },
                ];
                events.forEach(event => {
                    if (data.labels.length > 0 && data.labels.length % 10 === 0) {
                        alert(`年: ${event.year} - ${event.event}`);
                    }
                });
            }, 1000);
            gsap.to('#population-counter', { duration: 1, scale: 1.2, yoyo: true, repeat: -1 });
        });
    </script>
</body>
</html>
